{% from "macros/modal.html" import modal_form %}

{% call modal_form(
    title="Add Event Type" if is_new else "Edit Event Type",
    action_url="/meh/ui/editor/event-type",
    submit_text="Add" if is_new else "Save"
) %}
<div class="form-group">
    <label for="type-name">Type Name</label>
    <input type="text" 
           id="type-name" 
           name="name" 
           value="{{ current_name or '' }}"
           autocomplete="off"
           required
           hx-get="/meh/ui/editor/check-event-type"
           hx-trigger="input changed delay:300ms"
           hx-target="#type-resolution"
           hx-include="this"
           hx-vals='{"original_name": "{{ original_name or '' }}"}'>
    {% if original_name %}
    <input type="hidden" name="original_name" value="{{ original_name }}">
    {% endif %}
</div>
<div id="type-resolution" class="port-resolution"></div>
{% endcall %}
