<div class="modal">
    <div class="modal-header">
        <h3>New Mapping</h3>
        <button type="button" class="btn-icon modal-close" data-action="close-modal">
            <img src="/static/assets/icons/x-mark.svg" class="icon" alt="Close">
        </button>
    </div>
    <div class="modal-body">
        <div class="alert alert-warning">
            <img src="/static/assets/icons/exclamation-triangle.svg" class="icon" alt="">
            <div>This will erase the current mapping. Download your mapping first if you want to keep it.</div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn" data-action="close-modal">Cancel</button>
        <button type="button" class="btn"
                onclick="downloadMapping(); closeModal();">
            <img src="/static/assets/icons/arrow-down-tray.svg" class="icon" alt="">
            Download first
        </button>
        <button type="button" class="btn btn-primary"
                hx-post="/meh/ui/editor/api/mapping/new"
                hx-target="#main-content"
                hx-swap="innerHTML"
                hx-on::after-request="if(event.detail.successful) { closeModal(); updateDirtyIndicator(); }">
            Start fresh
        </button>
    </div>
</div>
